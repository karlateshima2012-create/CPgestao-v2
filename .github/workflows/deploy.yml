name: Build and Sync Deploy - CPgestao

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql, mysql
          coverage: none

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          composer install --no-dev --optimize-autoloader

      - name: Prepare Deployment Package
        run: |
          mkdir -p deploy_package/api_backend
          cp -r frontend/dist/* deploy_package/
          
          # Copiar backend excluindo arquivos desnecessários
          cp -r backend/* deploy_package/api_backend/
          rm -f deploy_package/api_backend/.env
          rm -rf deploy_package/api_backend/storage/logs/*
          rm -f deploy_package/api_backend/bootstrap/cache/*.php
          
          # Root .htaccess
          cat <<'EOT' > deploy_package/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /
              RewriteRule ^api/(.*)$ api_backend/public/$1 [L]
              RewriteRule ^index\.html$ - [L]
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule . /index.html [L]
          </IfModule>
          EOT
          
          cd deploy_package
          zip -r ../deploy_package.zip .
          cd ..

      - name: Upload Package to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 65002
          source: "deploy_package.zip"
          target: "domains/creativeprintjp.com/public_html/cpgestao/"

      - name: Extract and Finish Deploy
        uses: appleboy/ssh-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 65002
          script: |
            cd domains/creativeprintjp.com/public_html/cpgestao
            unzip -o deploy_package.zip
            rm deploy_package.zip
            
            cd api_backend
            
            # Limpeza preventiva de cache do Laravel
            rm -f bootstrap/cache/*.php
            
            echo "APP_NAME=CPGestao" > .env
            echo "APP_ENV=production" >> .env
            echo "APP_KEY=${{ secrets.APP_KEY || 'base64:frVEFHT1ndFoOzJ0ugdv5C8xSHa6Y9ZcYJPXVbtYubI=' }}" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "APP_URL=https://cpgestao.creativeprintjp.com" >> .env
            
            # CONFIGURAÇÃO MARIADB (Hostinger)
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=${{ secrets.DB_HOST || 'localhost' }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT || '3306' }}" >> .env
            echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            
            echo "SESSION_DRIVER=file" >> .env
            echo "CACHE_DRIVER=file" >> .env
            echo "QUEUE_CONNECTION=sync" >> .env
            echo "TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN || '8703394325:AAEZTczYtHMHx_POwTfFGUezU5EVXTZYyP4' }}" >> .env
            
            echo "--- VERIFICANDO INJEÇÃO DE AMBIENTE (SENSÍVEL OCULTO) ---"
            grep "DB_" .env | grep -v "PASSWORD"
            
            php artisan config:clear
            
            echo "--- EXECUTANDO MIGRAÇÕES ---"
            if php artisan migrate --force; then
                echo "✅ Migrações concluídas com sucesso!"
            else
                echo "❌ ERRO NAS MIGRAÇÕES. Verifique as credenciais no GitHub Secrets."
                exit 1
            fi
            
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan telegram:set-webhook
            chmod -R 775 storage bootstrap/cache
            echo "--- DEPLOY FINALIZADO ---"



