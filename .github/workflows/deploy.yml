name: Comprehensive Deploy CPgestao

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 65002
          script: |
            cd domains/creativeprintjp.com/public_html/cpgestao
            
            echo "--- INICIANDO DEPLOY ---"
            
            # 1. Atualizar código via Git
            git fetch --all
            git reset --hard origin/master
            
            # 2. Identificar diretório do Backend
            if [ -d "backend" ]; then
                B_DIR="backend"
            elif [ -d "api_backend" ]; then
                B_DIR="api_backend"
            fi
            echo "Diretório Backend: $B_DIR"
            
            # 3. Configurar Backend
            cd "$B_DIR"
            echo "--- BACKEND: Verificando .env ---"
            if [ -f ".env" ]; then
                grep -E "DB_CONNECTION|DB_HOST|DB_PORT|DB_DATABASE" .env | grep -v "PASSWORD"
            else
                echo "AVISO: .env não encontrado! Usando .env.example..."
                cp .env.example .env
                php artisan key:generate
            fi

            echo "--- BACKEND: Instalando dependências ---"
            composer install --no-dev --optimize-autoloader
            
            echo "--- BACKEND: Debug DB connection ---"
            php artisan tinker --execute="echo 'DB Connection: ' . DB::connection()->getDriverName() . PHP_EOL . 'Database: ' . DB::connection()->getDatabaseName() . PHP_EOL . 'Total Tenants: ' . (class_exists('App\Models\Tenant') ? App\Models\Tenant::count() : 'Tenant model not found') . PHP_EOL;"
            
            echo "--- BACKEND: Migrações ---"
            # Se estiver usando SQLite e falhando, talvez precise um migrate:fresh se for ambiente de teste
            # Mas vamos tentar o migrate normal primeiro com verbose
            php artisan migrate --force -v
            
            echo "--- BACKEND: Seeders ---"
            php artisan db:seed --force -v

            
            echo "--- BACKEND: Caching ---"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            cd ..
            
            # 4. Configurar Frontend
            if [ -d "frontend" ]; then
                echo "--- FRONTEND: Build ---"
                cd frontend
                npm install
                npm run build
                echo "--- FRONTEND: Movendo arquivos do build para a raiz ---"
                cp -r dist/* ../
                cd ..
            fi
            
            # 5. Ajustar permissões
            echo "--- AJUSTANDO PERMISSÕES ---"
            chmod -R 775 "$B_DIR/storage" "$B_DIR/bootstrap/cache"
            
            echo "--- DEPLOY CONCLUÍDO COM SUCESSO ---"

