name: Deploy to Hostinger

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 65002
          script: |
            # Tentar encontrar a pasta raiz do projeto (onde está o 'backend' e 'frontend')
            SEARCH_PATH=$(find . -name "backend" -type d -not -path "*/.*" | head -n 1)
            
            if [ -n "$SEARCH_PATH" ]; then
                ROOT_DIR=$(dirname "$SEARCH_PATH")
                echo "Projeto encontrado em: $ROOT_DIR"
                cd "$ROOT_DIR"
            else
                echo "ERRO: Pasta 'backend' não encontrada no servidor!"
                exit 1
            fi
            
            git fetch --all
            git reset --hard origin/master
            
            # Backend Setup
            cd backend
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan db:seed --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Frontend Setup
            cd ../frontend
            npm install
            npm run build
            
            # Deploy Frontend to Root (um nível acima de frontend/)
            cp -r dist/* ../
            
            # Fix Permissions
            cd ../
            chmod -R 775 backend/storage backend/bootstrap/cache
