name: Build and Sync Deploy - CPgestao

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          composer install --no-dev --optimize-autoloader

      - name: Prepare Deployment Package
        run: |
          mkdir -p deploy_package/api_backend
          cp -r frontend/dist/* deploy_package/
          
          # Copiar backend excluindo arquivos desnecessários
          cp -r backend/* deploy_package/api_backend/
          rm -f deploy_package/api_backend/.env
          rm -rf deploy_package/api_backend/storage/logs/*
          rm -f deploy_package/api_backend/bootstrap/cache/*.php
          
          # Root .htaccess
          cat <<'EOT' > deploy_package/.htaccess
          <IfModule mod_rewrite.c>
              RewriteEngine On
              RewriteBase /
              
              # Regras da API
              RewriteRule ^api/(.*)$ api_backend/public/$1 [L]
              
              # Regras do Frontend (React)
              RewriteRule ^index\.html$ - [L]
              RewriteCond %{REQUEST_FILENAME} !-f
              RewriteCond %{REQUEST_FILENAME} !-d
              RewriteRule . /index.html [L]
          </IfModule>
          EOT
          
          cd deploy_package
          zip -r ../deploy_package.zip .
          cd ..
 
      - name: Upload Package to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 65002
          source: "deploy_package.zip"
          target: "domains/creativeprintjp.com/public_html/cpgestao/"
 
      - name: Extract and Finish Deploy
        uses: appleboy/ssh-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 65002
          script: |
            cd domains/creativeprintjp.com/public_html/cpgestao
            
            echo "--- VERIFICANDO INFORMAÇÕES DO SISTEMA ---"
            php -v
            pwd
            ROOT_PATH=$(pwd)
            
            echo "--- ATUALIZANDO CÓDIGO ---"
            unzip -o deploy_package.zip
            cd api_backend
            
            # Garantir permissões básicas antes de tudo
            chmod -R 777 storage bootstrap/cache
            
            echo "--- GERANDO .ENV ---"
            cat <<EOT > .env
            APP_NAME=CPGestao
            APP_ENV=production
            APP_KEY=${{ secrets.APP_KEY || 'base64:frVEFHT1ndFoOzJ0ugdv5C8xSHa6Y9ZcYJPXVbtYubI=' }}
            APP_DEBUG=false
            APP_URL=https://cpgestao.creativeprintjp.com
            DB_CONNECTION=mysql
            DB_HOST=${{ secrets.DB_HOST || 'localhost' }}
            DB_PORT=${{ secrets.DB_PORT || '3306' }}
            DB_DATABASE=${{ secrets.DB_DATABASE }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            SESSION_DRIVER=file
            CACHE_DRIVER=file
            QUEUE_CONNECTION=sync
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN || '8703394325:AAEZTczYtHMHx_POwTfFGUezU5EVXTZYyP4' }}
            EOT
            
            echo "--- LIMPANDO CACHES ---"
            php artisan optimize:clear
            
            echo "--- CONFIGURANDO STORAGE ---"
            # Remover links antigos se existirem (força remoção de pastas se necessário)
            rm -rf public/storage || true
            rm -rf ../storage || true
            
            # Garantir que a pasta de destino do link existe
            mkdir -p storage/app/public/clientes/thumbs
            
            # Criar link na pasta public do laravel (para compatibilidade interna)
            php artisan storage:link || true
            
            # Criar link na raiz do site (para o frontend e telegram)
            # Usamos caminho absoluto para evitar erros de resolução no apache
            # Usamos -sf para forçar a criação mesmo que já exista
            ln -sf $ROOT_PATH/api_backend/storage/app/public $ROOT_PATH/storage || true
            
            # Garantir permissões
            chmod -R 777 storage/app/public || true
            
            echo "--- EXECUTANDO MIGRAÇÕES (MODO DE EMERGÊNCIA) ---"
            php artisan migrate --force || echo "⚠️ Alerta: Erro nas migrações."
            
            echo "--- FINALIZANDO CONFIGURAÇÃO ---"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            chmod -R 777 storage bootstrap/cache
            cd ..
            rm deploy_package.zip
            echo "--- DEPLOY FINALIZADO ---"



