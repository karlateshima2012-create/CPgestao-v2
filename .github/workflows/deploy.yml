name: Comprehensive Deploy CPgestao

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Execute Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 65002
          script: |
            cd domains/creativeprintjp.com/public_html/cpgestao
            
            echo "--- INICIANDO DEPLOY ---"
            
            # 1. Atualizar código via Git
            git fetch --all
            git reset --hard origin/master
            
            # 2. Identificar diretório do Backend
            if [ -d "backend" ]; then
                B_DIR="backend"
            elif [ -d "api_backend" ]; then
                B_DIR="api_backend"
            fi
            
            # 3. Configurar Backend (.env)
            cd "$B_DIR"
            echo "--- BACKEND: Gerando .env ---"
            echo "APP_NAME=CPGestao" > .env
            echo "APP_ENV=production" >> .env
            echo "APP_KEY=${{ secrets.APP_KEY || 'base64:frVEFHT1ndFoOzJ0ugdv5C8xSHa6Y9ZcYJPXVbtYubI=' }}" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "APP_URL=https://cpgestao.creativeprintjp.com" >> .env
            echo "" >> .env
            echo "DB_CONNECTION=${{ secrets.DB_CONNECTION || 'pgsql' }}" >> .env
            echo "DB_HOST=${{ secrets.DB_HOST || 'aws-0-sa-east-1.pooler.supabase.com' }}" >> .env
            echo "DB_PORT=${{ secrets.DB_PORT || '6543' }}" >> .env
            echo "DB_DATABASE=${{ secrets.DB_DATABASE || 'postgres' }}" >> .env
            echo "DB_USERNAME=${{ secrets.DB_USERNAME || 'postgres.seu-projeto' }}" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "" >> .env
            echo "SESSION_DRIVER=file" >> .env
            echo "CACHE_DRIVER=file" >> .env
            echo "QUEUE_CONNECTION=sync" >> .env
            
            echo "--- BACKEND: Instalando dependências ---"
            composer install --no-dev --optimize-autoloader
            
            echo "--- BACKEND: Migrações ---"
            php artisan migrate --force
            
            echo "--- BACKEND: Seeders ---"
            php artisan db:seed --force
            
            echo "--- BACKEND: Caching ---"
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            cd ..
            
            # 4. Configurar Frontend
            if [ -d "frontend" ]; then
                echo "--- FRONTEND: Build ---"
                cd frontend
                npm install
                npm run build
                echo "--- FRONTEND: Movendo arquivos do build para a raiz ---"
                cp -r dist/* ../
                cd ..
            fi
            
            # 5. Configurar Redirecionamentos (.htaccess)
            echo "--- CONFIGURANDO .htaccess ---"
            
            # .htaccess na raiz para gerenciar API e SPA
            echo "<IfModule mod_rewrite.c>" > .htaccess
            echo "    RewriteEngine On" >> .htaccess
            echo "    RewriteBase /" >> .htaccess
            echo "    RewriteRule ^api/(.*)$ $B_DIR/public/\$1 [L]" >> .htaccess
            echo "    RewriteRule ^index\.html$ - [L]" >> .htaccess
            echo "    RewriteCond %{REQUEST_FILENAME} !-f" >> .htaccess
            echo "    RewriteCond %{REQUEST_FILENAME} !-d" >> .htaccess
            echo "    RewriteRule . /index.html [L]" >> .htaccess
            echo "</IfModule>" >> .htaccess

            # Remover a pasta api/ antiga para evitar conflitos se existir
            rm -rf api
            
            # 6. Ajustar permissões
            echo "--- AJUSTANDO PERMISSÕES ---"
            chmod -R 775 "$B_DIR/storage" "$B_DIR/bootstrap/cache"
            
            echo "--- DEPLOY CONCLUÍDO COM SUCESSO ---"




