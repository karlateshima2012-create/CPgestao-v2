name: Final Deploy CPgestao

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 65002
          script: |
            cd domains/creativeprintjp.com/public_html/cpgestao
            
            # Garantir que estamos com o código mais recente
            git fetch --all
            git reset --hard origin/master
            
            # 1. Configurar Backend
            # O repositório usa 'backend/', o servidor usa 'api_backend/'
            # Vamos sincronizar o conteúdo ou usar o 'backend/' do git
            if [ -d "backend" ]; then
                echo "Usando pasta 'backend' do repositório..."
                B_DIR="backend"
            elif [ -d "api_backend" ]; then
                echo "Usando pasta 'api_backend' do servidor..."
                B_DIR="api_backend"
            else
                echo "ERRO: Nenhuma pasta de backend encontrada!"
                exit 1
            fi
            
            cd "$B_DIR"
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan db:seed --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            cd ..
            
            # 2. Configurar Frontend
            if [ -d "frontend" ]; then
                cd frontend
                npm install
                npm run build
                # Mover o build para a raiz de 'cpgestao'
                cp -r dist/* ../
                cd ..
            fi
            
            # 3. Permissões
            chmod -R 775 "$B_DIR/storage" "$B_DIR/bootstrap/cache"
            echo "DEPLOY CONCLUÍDO COM SUCESSO!"
