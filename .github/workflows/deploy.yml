name: Deploy to Hostinger

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 46.202.186.144
          username: u176367625
          password: ${{ secrets.HOSTINGER_PASSWORD }}
          port: 65002
          script: |
            # Tentar encontrar o diretório correto
            if [ -d "domains/creativeprintjp.com/public_html/cpgestao" ]; then
              cd domains/creativeprintjp.com/public_html/cpgestao
            elif [ -d "public_html/cpgestao" ]; then
              cd public_html/cpgestao
            else
              echo "Diretório do projeto não encontrado!"
              exit 1
            fi
            
            git fetch --all
            git reset --hard origin/master
            
            # Backend Setup
            cd backend
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan db:seed --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Frontend Setup
            cd ../frontend
            npm install
            npm run build
            
            # Deploy Frontend to Root
            cp -r dist/* ../
            
            # Fix Permissions
            cd ../
            chmod -R 775 backend/storage backend/bootstrap/cache
